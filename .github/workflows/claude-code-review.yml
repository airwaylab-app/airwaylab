name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel in-progress reviews when new commits are pushed to the same PR.
# Only the latest push gets a full review — prevents wasted runs on rapid iteration.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Only review PRs from the same repo (not forks).
    # Fork PRs are the primary injection vector: attacker controls the code diff
    # that Claude reads, and could embed prompt injection in comments/strings.
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Before reviewing, read .github/prompts/code-review.md for project-specific review criteria that MUST be applied in addition to standard checks.

            Then run: /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
