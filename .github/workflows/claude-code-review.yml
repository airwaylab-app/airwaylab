name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "hooks/**"
      - "workers/**"
      - "__tests__/**"
      - "supabase/**"
      - "package.json"
      - "tsconfig.json"
      - "next.config.*"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # v1 takes prompt TEXT, not a path: load the file contents into a step output.
      - name: Load code-review prompt
        id: prompt
        run: |
          {
            echo 'PROMPT<<CLAUDE_PROMPT_EOF'
            cat .github/prompts/code-review.md
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: "--model claude-opus-4-8"
          track_progress: true
          use_sticky_comment: true
